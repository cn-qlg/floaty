name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload artifacts to"
        required: false
        default: ""

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      DISPATCH_TAG: ${{ inputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable, x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app (Windows x86_64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: floaty-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Attach artifacts to tag-pushed release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false

      - name: Attach artifacts to manual-dispatch tag
        if: github.event_name == 'workflow_dispatch' && env.DISPATCH_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DISPATCH_TAG }}
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false
