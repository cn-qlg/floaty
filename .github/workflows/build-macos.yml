name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload artifacts to"
        required: false
        default: ""

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner
    permissions:
      contents: write
    env:
      DISPATCH_TAG: ${{ inputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable, aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app (macOS aarch64)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: floaty-macos-aarch64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Attach artifacts to tag-pushed release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false

      - name: Attach artifacts to manual-dispatch tag
        if: github.event_name == 'workflow_dispatch' && env.DISPATCH_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DISPATCH_TAG }}
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false
