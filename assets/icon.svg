<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE7B0"/>
      <stop offset="55%" stop-color="#FFD277"/>
      <stop offset="100%" stop-color="#F5B947"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24"/>
      <feOffset dx="0" dy="16" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- sticky body, slightly rotated for paper feel -->
  <g transform="rotate(-4 512 512)" filter="url(#sh)">
    <rect x="112" y="112" width="800" height="800" rx="128" ry="128" fill="url(#bg)"/>
    <!-- bottom-right corner fold -->
    <path d="M 912 752 L 912 912 L 752 912 Q 752 752 912 752 Z" fill="#D99A3A"/>
    <path d="M 912 752 L 752 912 Q 752 842 800 800 Q 848 760 912 752 Z" fill="#F7C564" opacity="0.85"/>
  </g>

  <!-- bold checkmark -->
  <path d="M 308 538 L 458 688 L 744 372"
        stroke="#3a2e10"
        stroke-width="92"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
